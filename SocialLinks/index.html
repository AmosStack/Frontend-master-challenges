<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | Social links profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
</head>
<body>
  <div class="card">
    <div class="img">
        <img src="avatar-jessica.jpeg" alt="profile-picture" class="profile-image">
    </div>
    <div class="one">Jessica Randall</div>
    <div class="two">London, United Kingdom</div>
    <div class="self">
      "Front-end developer and avid reader."
    </div>
    <div class="button">
      <div class="links">Github</div>
      <div class="links">Frontend Mentor</div>
      <div class="links">Linkedin</div>
      <div class="links">Twitter</div>
      <div class="links">Instagram</div>
    </div>
  </div>
</body>
</html>
