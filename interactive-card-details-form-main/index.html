<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">

  <title>Frontend Mentor | Interactive card details form</title>
</head>
<body>
  <main class="page" aria-live="polite">
    <section class="card-preview" aria-hidden="true">
      <article class="card card-front">
        <img class="card-logo" src="./images/card-logo.svg" alt="">
        <p class="card-number" id="cardNumberPreview">0000 0000 0000 0000</p>
        <div class="card-footer">
          <p class="card-name" id="cardNamePreview">JANE APPLESEED</p>
          <p class="card-expiry"><span id="cardMonthPreview">00</span>/<span id="cardYearPreview">00</span></p>
        </div>
      </article>

      <article class="card card-back">
        <p class="card-cvc" id="cardCvcPreview">000</p>
      </article>
    </section>

    <section class="content" aria-label="Card details">
      <form id="cardForm" class="card-form" novalidate>
        <div class="form-field">
          <label for="cardholderName">Cardholder Name</label>
          <input
            id="cardholderName"
            name="cardholderName"
            type="text"
            inputmode="text"
            placeholder="e.g. Jane Appleseed"
            maxlength="26"
            autocomplete="cc-name"
          >
          <p class="error-message" id="nameError"></p>
        </div>

        <div class="form-field">
          <label for="cardNumber">Card Number</label>
          <input
            id="cardNumber"
            name="cardNumber"
            type="text"
            inputmode="numeric"
            placeholder="e.g. 1234 5678 9123 0000"
            autocomplete="cc-number"
            maxlength="19"
          >
          <p class="error-message" id="numberError"></p>
        </div>

        <div class="details-grid">
          <div class="form-field">
            <label for="expMonth">Exp. Date (MM/YY)</label>
            <div class="exp-group">
              <input
                id="expMonth"
                name="expMonth"
                type="text"
                inputmode="numeric"
                placeholder="MM"
                maxlength="2"
                autocomplete="cc-exp-month"
              >
              <input
                id="expYear"
                name="expYear"
                type="text"
                inputmode="numeric"
                placeholder="YY"
                maxlength="2"
                autocomplete="cc-exp-year"
              >
            </div>
            <p class="error-message" id="expError"></p>
          </div>

          <div class="form-field">
            <label for="cvc">CVC</label>
            <input
              id="cvc"
              name="cvc"
              type="text"
              inputmode="numeric"
              placeholder="e.g. 123"
              maxlength="3"
              autocomplete="cc-csc"
            >
            <p class="error-message" id="cvcError"></p>
          </div>
        </div>

        <button type="submit" class="btn">Confirm</button>
      </form>

      <section id="completedState" class="completed-state" hidden>
        <img src="./images/icon-complete.svg" alt="">
        <h1>Thank you!</h1>
        <p>We've added your card details</p>
        <button id="continueBtn" type="button" class="btn">Continue</button>
      </section>
    </section>
  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
    Coded by <a href="#">AmosStack</a>.
  </div>

  <script src="./script.js"></script>
</body>
</html>
