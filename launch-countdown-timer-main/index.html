<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Launch countdown timer</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <h1>We're launching soon</h1>

    <section class="countdown" aria-label="Countdown timer">
      <div class="time-unit">
        <div class="flip-card"><span id="days">14</span></div>
        <p>Days</p>
      </div>

      <div class="time-unit">
        <div class="flip-card"><span id="hours">00</span></div>
        <p>Hours</p>
      </div>

      <div class="time-unit">
        <div class="flip-card"><span id="minutes">00</span></div>
        <p>Minutes</p>
      </div>

      <div class="time-unit">
        <div class="flip-card"><span id="seconds">00</span></div>
        <p>Seconds</p>
      </div>
    </section>

    <nav class="socials" aria-label="Social media links">
      <a href="#" aria-label="Facebook" class="social-link social-facebook"></a>
      <a href="#" aria-label="Pinterest" class="social-link social-pinterest"></a>
      <a href="#" aria-label="Instagram" class="social-link social-instagram"></a>
    </nav>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">AmosStack</a>.
  </footer>

  <script src="./script.js"></script>
</body>
</html>
