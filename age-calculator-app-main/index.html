<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Age calculator app</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="title">
      <h1 id="title" class="visually-hidden">Age calculator</h1>

      <form id="age-form" novalidate>
        <div class="fields">
          <div class="field" data-field="day">
            <label for="day">Day</label>
            <input
              id="day"
              name="day"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="2"
              placeholder="DD"
              aria-describedby="day-error"
            >
            <p id="day-error" class="error"></p>
          </div>

          <div class="field" data-field="month">
            <label for="month">Month</label>
            <input
              id="month"
              name="month"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="2"
              placeholder="MM"
              aria-describedby="month-error"
            >
            <p id="month-error" class="error"></p>
          </div>

          <div class="field" data-field="year">
            <label for="year">Year</label>
            <input
              id="year"
              name="year"
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="4"
              placeholder="YYYY"
              aria-describedby="year-error"
            >
            <p id="year-error" class="error"></p>
          </div>
        </div>

        <div class="divider">
          <button type="submit" class="submit-button" aria-label="Calculate age">
            <img src="./assets/images/icon-arrow.svg" alt="">
          </button>
        </div>
      </form>

      <div class="result" aria-live="polite" aria-atomic="true">
        <p><span id="years">--</span> years</p>
        <p><span id="months">--</span> months</p>
        <p><span id="days">--</span> days</p>
      </div>
    </section>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">AmosStack</a>.
  </footer>

  <script src="./script.js"></script>
</body>
</html>
